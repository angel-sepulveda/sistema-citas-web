<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de citas</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- CONTENEDOR -->
    <div class="contenedor">

        <h1>Agendar visita técnica</h1>

        <!-- FORMULARIO -->
        <form id="formCita">

            <!-- NOMBRE -->
            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required
            >

            <!-- TELÉFONO -->
            <input
                type="tel"
                id="telefono"
                placeholder="Teléfono"
                required
            >

            <!-- DIRECCIÓN -->
            <input
                type="text"
                id="direccion"
                placeholder="Dirección"
                required
            >

            <!-- FECHA -->
            <input
                type="date"
                id="fecha"
                required
            >

            <!-- HORA -->
            <input
                type="time"
                id="hora"
                required
            >

            <!-- SERVICIO -->
            <select id="servicio" required>

                <option value="">
                    Seleccione servicio
                </option>

                <option value="Instalación">
                    Instalación
                </option>

                <option value="Mantenimiento">
                    Mantenimiento
                </option>

                <option value="Posventa">
                    Posventa
                </option>

            </select>

            <!-- BOTÓN -->
            <button type="submit">

                Agendar cita

            </button>

        </form>

        <!-- MENSAJES -->
        <div id="mensaje"></div>

        <!-- LISTADO -->
        <div id="listaCitas"></div>

    </div>

    <!-- JS -->
    <script src="js/app.js"></script>

</body>
</html>
